<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body class="bg-light">
<div class="container">
    <div class="row">
        <div class="col-sm-9 col-md-7 col-lg-5 mx-auto">
            <div class="card border-0 shadow rounded-3 my-5">
                <div class="card-body p-4 p-sm-5">
                    <h1 class="card-title text-center mb-4 fw-light fs-5">Cadastro</h1>
                    <form action="{% url 'cadastro' %}" method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Nome Completo</label>
                            <input type="text" id="username" name="nome" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label for="usermail" class="form-label">E-mail</label>
                            <input type="email" id="usermail" name="email" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label for="userpassword" class="form-label">Senha</label>
                            <input type="password" id="userpassword" name="senha" class="form-control" required/>
                        </div>
                        <div class="d-grid">
                            <button class="btn btn-primary" type="submit">Cadastrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
