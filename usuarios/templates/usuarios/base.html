{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" />
    <title>
      {% block aba %}
        Template base
      {% endblock %}
    </title>
  </head>
  <body>
    <!-- Responsive navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #008000;">
      <div class="container px-5">
        <a class="navbar-brand" href="{% url 'home' %}">Diário de Notas</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{% url 'home' %}">Página Inicial</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Sobre</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contato</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'logout' %}">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Page Content -->
    <div class="container px-4 px-lg-5">
      {% block conteudo %}

      {% endblock %}
    </div>
    <!-- Footer -->
    <footer class="py-5 fixed-bottom" style="background-color: #008000;">
      <div class="container px-4 px-lg-5">
        <p class="m-0 text-center text-white">Copyright &copy; Diário de notas 2026</p>
      </div>
    </footer>
  </body>
</html>
