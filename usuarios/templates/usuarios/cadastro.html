{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <title>Cadastro de Usuários</title>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-sm-10 col-md-8 col-lg-5">
                <div class="card border-0 shadow rounded-3">
                    <div class="card-body p-4 p-sm-5">
                        <h5 class="card-title text-center mb-4 fw-light fs-5">Cadastro de Usuários</h5>

                        <form action="{% url 'cadastro' %}" method="POST">
                            {% csrf_token %}

                            <div class="mb-3 input-name">
                                <label for="username" class="form-label">Nome Completo:</label>
                                <input type="text" class="form-control" id="username" name="nome" required>
                            </div>

                            <div class="mb-3 input-email">
                                <label for="useremail" class="form-label">E-mail:</label>
                                <input type="email" class="form-control" id="useremail" name="email" required>
                            </div>

                            <div class="mb-3 input-password">
                                <label for="userpassword" class="form-label">Senha:</label>
                                <input type="password" class="form-control" id="userpassword" name="senha" required>
                            </div>

                            <div class="d-grid register-button">
                                <button class="btn btn-primary register-b" type="submit">Cadastrar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
