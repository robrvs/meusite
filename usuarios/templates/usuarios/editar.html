{% extends 'usuarios/base.html' %}

{% block aba %}Editar Nota{% endblock %}

{% block conteudo %}
<h3>Edição da Nota Selecionada</h3>
<p>Verifique as informações cadastradas e faça as devidas edições.</p>
<hr>

<form action="{% url 'editar' lista_notas.pk %}" method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label for="disciplinaName" class="form-label">Disciplina:</label>
        <input type="text" id="disciplinaName" name="disciplina" class="form-control" value="{{ lista_notas.disciplina }}">
    </div>

    <div class="mb-3">
        <label for="notaAtividades" class="form-label">Nota das Atividades:</label>
        <input type="text" id="notaAtividades" name="nota_atividades" class="form-control" value="{{ lista_notas.nota_atividades }}">
    </div>

    <div class="mb-3">
        <label for="notaTrabalho" class="form-label">Nota do Trabalho:</label>
        <input type="text" id="notaTrabalho" name="nota_trabalho" class="form-control" value="{{ lista_notas.nota_trabalho }}">
    </div>

    <div class="mb-3">
        <label for="notaProva" class="form-label">Nota da Prova:</label>
        <input type="text" id="notaProva" name="nota_prova" class="form-control" value="{{ lista_notas.nota_prova }}">
    </div>

    <div class="update">
        <button type="submit" class="btn btn-success btn-sm">Atualizar</button>
        <a href="{% url 'alterar' %}" class="btn btn-danger btn-sm">Voltar</a>
    </div>
</form>
{% endblock %}
